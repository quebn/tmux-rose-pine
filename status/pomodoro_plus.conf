# vim:set ft=tmux:
# Requires https://github.com/olimorris/tmux-pomodoro-plus
%hidden MODULE_NAME="pomodoro_plus"

set -ogq "@rosepine_${MODULE_NAME}_icon" " "
set -ogqF "@rosepine_${MODULE_NAME}_color" "#{E:@thm_gold}"
set -ogq "@rosepine_${MODULE_NAME}_text" "#{pomodoro_status}"

source -F "#{d:current_file}/../utils/status_module.conf"
